<!DOCTYPE html>
<html>
<head>
  <title>NPTEL Exam Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #e6ebf1;
    }

    .wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #ffffff;
      width: 380px;
      padding: 25px 20px;
      border-radius: 14px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.15);
      text-align: center;
    }

    /* LOGO FIXED (wide like original) */
    .logo img {
      width: 220px;
      height: auto;
      margin-bottom: 10px;
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      color: #2c3e50;
      margin-bottom: 20px;
      line-height: 1.3;
    }

    .input-box {
      width: 100%;
      padding: 13px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #d0d7de;
      font-size: 14px;
      background: #f8fafc;
    }

    .note {
      color: #d60000;
      font-size: 12px;
      text-align: left;
      margin-bottom: 8px;
    }

    .yellow-box {
      background: #fff176;
      padding: 10px;
      font-size: 13px;
      margin: 15px 0;
      font-weight: 600;
      border-radius: 4px;
    }

    .yellow-box span {
      color: blue;
      text-decoration: underline;
      cursor: pointer;
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: #3a8ec1;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .login-btn:hover {
      background: #2f7aa8;
    }
  </style>
</head>

<body>

<div class="wrapper">
  <div class="card">

    <!-- LOGO -->
    <div class="logo">
      <img src="logo.png" alt="NPTEL Logo">
    </div>

    <div class="title">
      NPTEL Jan-Apr 2026<br>Exam Portal
    </div>

    <input class="input-box" type="email" placeholder="📧 Email ID">
    <div class="note">Note: Please enter your exam registered email ID</div>

    <input class="input-box" type="password" placeholder="🔒 Password (Format: YYYY-MM-DD)">
    <div class="note">
      Note: Password format should be YYYY-MM-DD<br>
      (Please enter password with the hyphen(-) symbol)
    </div>

    <div class="yellow-box">
      Note: Please check your DOB submitted in your exam registration form -
      <span>Click here!</span>
    </div>

    <button class="login-btn" onclick="login()">🔓 Login</button>

  </div>
</div>

<script>
function login() {
  document.body.innerHTML = `
    <h2 style="text-align:center;margin-top:120px;">
      Fetching result... ⏳
    </h2>
  `;

  setTimeout(() => {
    window.location.href = "https://www.jmu.edu/april-fools-got-ya.shtml";
  }, 3000);
}
</script>

</body>
</html>
